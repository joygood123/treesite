# ── DeployBoard — Nginx Wildcard Config ─────────────────────────────────────
# File: /etc/nginx/conf.d/deployboard.conf  (or sites-available/deployboard)
#
# Handles:
#   joytreehostingserver.dpdns.org         → DeployBoard dashboard
#   *.joytreehostingserver.dpdns.org       → User deployed sites
#
# Cloudflare wildcard A record: * → 35.205.83.73 covers all subdomains.

# ── DeployBoard dashboard ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name joytreehostingserver.dpdns.org www.joytreehostingserver.dpdns.org;

    # Proxy to Node.js app
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        # Socket.io long-polling needs longer timeouts
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }
}

# ── Wildcard: all deployed user sites ─────────────────────────────────────────
# Regex captures the subdomain from the hostname
server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9][a-z0-9-]{0,61})\.joytreehostingserver\.dpdns\.org$;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss image/svg+xml;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    location / {
        # Serve static files from the subdomain's dist folder
        root  /var/www/user-sites/$subdomain/dist;
        index index.html index.htm;

        # SPA fallback — React/Vue/Svelte client-side routing
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Never cache index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }
    }

    # Fallback: if site not deployed yet, proxy to dashboard 404
    error_page 404 = @not_deployed;
    location @not_deployed {
        proxy_pass http://localhost:3001;
    }
}
